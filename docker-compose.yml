services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chinchin_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-c2hpbmNoaW50aXJhcGllLWJhY2tlbmQtand0LXNlY3JldC1rZXktMjAyNi1zdXBlci1zZWN1cmU=}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: chinchin_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
