name: Deploy to Render

# Solo se dispara manualmente desde la pestaña "Actions" en GitHub
# Así no deployeas a cada rato — solo cuando tú quieras
on:
  workflow_dispatch:
    inputs:
      service:
        description: '¿Qué quieres deployar?'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - backend
          - frontend

jobs:
  deploy-backend:
    name: 🚀 Deploy Backend
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.service == 'backend' || github.event.inputs.service == 'both' }}
    steps:
      - name: Trigger Render deploy (Backend)
        run: |
          echo "Disparando deploy del Backend en Render..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            -X POST \
            -H "Accept: application/json" \
            "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy del Backend disparado correctamente."

  deploy-frontend:
    name: 🌐 Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.service == 'frontend' || github.event.inputs.service == 'both' }}
    steps:
      - name: Trigger Render deploy (Frontend)
        run: |
          echo "Disparando deploy del Frontend en Render..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            -X POST \
            -H "Accept: application/json" \
            "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"
          echo "✅ Deploy del Frontend disparado correctamente."
